# TSK — The Stellar Kraft · Netlify deploy config
[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# force https + non-www -> www (canonical)
[[redirects]]
  from = "https://thestellarkraft.com/*"
  to = "https://www.thestellarkraft.com/:splat"
  status = 301
  force = true
