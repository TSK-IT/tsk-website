<section class="phead wrap">

  <div class="crumb reveal"><a href="index.html" data-trans>Home</a><span class="sep">/</span><a href="services.html" data-trans>Collections</a><span class="sep">/</span><span id="cName">—</span></div>

  <h1 class="display reveal reveal-d1" id="cTitle">—</h1>
  <p class="psub lead reveal reveal-d2" id="cBlurb"></p>
  <div class="filters reveal reveal-d3 mt-l" id="filters"></div>
</section>

<section class="wrap" style="padding-bottom:clamp(80px,11vw,160px)">
  <div class="cat-grid" id="grid"></div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
window.PAGE_READY=function(){
  const {C,$,$$,param,imgFull,byDiv,divMeta,productCard,reveal}=window.TSK;
  const dv = param('division') || 'lighting';
  const meta = divMeta(dv);
  const prods = byDiv(dv);
  document.title = `${meta.title} — ${prods.length} bespoke creations | TSK · The Stellar Kraft`;
  $('#cName').textContent = meta.title;
  $('#cKick').textContent = `${meta.kicker} · ${prods.length} creations`;
  $('#cTitle').textContent = meta.title;
  $('#cBlurb').textContent = meta.blurb;
  $('#phbg').innerHTML = `<img src="${imgFull(meta.hero)}" alt="${meta.title} — TSK">`;
  // beige treatment for sea-view / warm ceiling division
  if(meta.seaview){ document.querySelector('.phead').classList.add('sec-beige'); document.querySelector('.phead .pbg').style.opacity='.85'; }

  const PAGE = 30;
  let shown = 0, currentList = prods;

  function renderReset(list){
    currentList = list; shown = 0;
    $('#grid').innerHTML = '';
    more();
  }
  function more(){
    const slice = currentList.slice(shown, shown+PAGE);
    $('#grid').insertAdjacentHTML('beforeend', slice.map(p=>productCard(p)).join(''));
    shown += slice.length;
    reveal();
    renderMoreBtn();
  }
  function renderMoreBtn(){
    let bar = document.querySelector('#moreBar');
    if(!bar){ bar = document.createElement('div'); bar.id='moreBar'; bar.style.cssText='text-align:center;margin-top:54px'; $('#grid').after(bar); }
    if(shown < currentList.length){
      bar.innerHTML = `<button class="btn" id="moreBtn">Load more — <span style="color:var(--silver)">${currentList.length-shown} remaining</span></button>`;
      document.querySelector('#moreBtn').addEventListener('click', more);
    } else { bar.innerHTML = `<span class="kicker dim">— end of collection · ${currentList.length} creations —</span>`; }
  }

  // filters: by collection
  const collections = [...new Set(prods.map(p=>p.collection))];
  const filters = ['All', ...collections];
  $('#filters').innerHTML = filters.map((f,i)=>`<button class="filter ${i===0?'active':''}" data-f="${f}">${f}</button>`).join('');
  renderReset(prods);

  $$('#filters .filter').forEach(b=>b.addEventListener('click',()=>{
    $$('#filters .filter').forEach(x=>x.classList.remove('active')); b.classList.add('active');
    const f=b.dataset.f;
    renderReset(f==='All'?prods:prods.filter(p=>p.collection===f));
    const top=document.querySelector('#grid').offsetTop-160;
    if(window.TSK.lenis){window.TSK.lenis.scrollTo(top);}else window.scrollTo({top,behavior:'smooth'});
  }));
};
</script>
