<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
window.PAGE_READY=function(){
  const {C,$,$$,imgFull,reveal}=window.TSK;
  $('#phbg').innerHTML = `<img src="${imgFull(C.backgrounds[5]||C.backgrounds[0])}" alt="">`;
  const T=[
    {q:'They did not deliver a chandelier. They delivered the soul of the lobby. Guests stop, look up, and forget what they were saying.',by:'Principal Architect',role:'5-Star Hospitality Group · Dubai'},
    {q:'The ceiling became our identity — the single most photographed surface in the entire resort.',by:'Owner',role:'Private Island Resort · Maldives'},
    {q:'Commissioning TSK feels like commissioning a sculptor, not ordering a product. Obsessive, precise, world-class.',by:'Design Director',role:'Ultra-Luxury Developer · London'},
    {q:'Monumental, and impossibly elegant. The sculpture is now the landmark our address is known by.',by:'Estate Principal',role:'Royal Residence · Riyadh'},
    {q:'Every promise was kept to the millimetre and the day. Rare, at this level of ambition.',by:'Project Lead',role:'Resort Group · Singapore'},
    {q:'The engineering confidence let us specify something no one believed could be built. It hangs perfectly.',by:'Structural Consultant',role:'Architecture Firm · Monaco'},
  ];
  $('#bigTesti').innerHTML = T.slice(0,4).map((t,i)=>`<div class="t-item ${i===0?'show':''}"><div class="t-card"><div class="kicker" style="margin-bottom:24px">— ${String(i+1).padStart(2,'0')} —</div><div class="t-quote">“${t.q}”</div><div class="t-by">${t.by}</div><div class="t-role">${t.role}</div></div></div>`).join('');
  $('#bigNav').innerHTML = T.slice(0,4).map((_,i)=>`<span class="t-dot ${i===0?'active':''}" data-i="${i}"></span>`).join('');
  let ti=0; const items=$$('#bigTesti .t-item'), dots=$$('#bigNav .t-dot');
  function show(n){items[ti].classList.remove('show');dots[ti].classList.remove('active');ti=(n+items.length)%items.length;items[ti].classList.add('show');dots[ti].classList.add('active');}
  let auto=setInterval(()=>show(ti+1),5000);
  dots.forEach(d=>d.addEventListener('click',()=>{clearInterval(auto);show(+d.dataset.i);auto=setInterval(()=>show(ti+1),5000);}));

  $('#grid').innerHTML = T.map((t,i)=>`
    <div class="reveal" style="background:rgba(255,255,255,.035);border:1px solid var(--line-soft);backdrop-filter:blur(10px);border-radius:6px;padding:clamp(28px,3vw,46px)">
      <div style="color:var(--gold);font-family:var(--serif);font-size:48px;line-height:.6">”</div>
      <p class="serif-it" style="font-size:clamp(18px,1.7vw,24px);line-height:1.4;margin:14px 0 26px">${t.q}</p>
      <div class="t-by">${t.by}</div><div class="t-role">${t.role}</div>
    </div>`).join('');

  reveal(); if(window._cursorHook)window._cursorHook();
};
</script>
